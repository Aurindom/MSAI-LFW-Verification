seed: 42

data:
  lfw_images_dir: data/lfw_images
  split_map_path: outputs/split_map.json
  manifest_path: outputs/manifest.json
  pairs_dir: outputs/pairs
  pairs_dir_v2: outputs/pairs_v2

splits:
  threshold_selection: val
  final_reporting: test

scoring:
  method: pixel_cosine_similarity
  score_direction: higher_is_more_similar
  image_size: 64

threshold_sweep:
  min: 0.01
  max: 0.99
  steps: 99

threshold_selection:
  rule: max_balanced_accuracy

pair_policy:
  positives_per_identity: 3
  negatives_per_identity: 3

pair_policy_v2:
  positives_per_identity: 3
  negatives_per_identity: 3
  max_pairs_per_identity: 6
  filter_duplicates: true
  enforce_balance: true

tracking:
  artifacts_dir: artifacts/runs
  summary_file: artifacts/runs_summary.csv

reports:
  figures_dir: reports/figures
